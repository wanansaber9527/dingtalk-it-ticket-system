name: Import project snapshot

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/import-project.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download project snapshot
        run: |
          set -euo pipefail
          curl -k -fsSL "https://it.qurands.com:38443/github-sync/dingtalk-it-ticket-system.tgz" -o /tmp/project.tgz
          rm -rf /tmp/project
          mkdir -p /tmp/project
          tar -xzf /tmp/project.tgz -C /tmp/project

      - name: Sync files into repository
        run: |
          set -euo pipefail
          rsync -a --delete --exclude='.git/' --exclude='.github/workflows/import-project.yml' /tmp/project/ ./

      - name: Commit imported project
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git status --short
          if git diff --cached --quiet; then
            echo "No project changes to commit."
          else
            git commit -m "Sync DingTalk IT ticket system fixes"
            git push
          fi
